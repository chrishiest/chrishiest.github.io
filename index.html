<html>
  <head>
    <meta charset="UTF-8">
    <title>★SMASHFRUIT ARCADE★</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
    body {
      font-family: comic-ms, sans-serif;
      color: white;
      margin: 40px;
      background-image: url("https://opengameart.org/sites/default/files/styles/medium/public/oga-textures/136049/arcade_carpet_512.png");
      background-repeat: repeat;
      background-size: auto;
      background-attachment: fixed;
    }
    /* Grid container */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    /* Each thumbnail card */
    .card {
      background-image: url("https://github.com/chrishiest/chrishiest.github.io/blob/main/images/card-bg.png?raw=true");
      background-repeat: repeat;
      background-size: 20%;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      text-align: center;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: scale(1.03);
    }
    /* Thumbnail image */
    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }
    /* Title link */
    .card a {
      display: block;
      padding: 12px;
      text-decoration: none;
      color: #25213e;
      font-weight: bold;
      font-size: 1.1rem;
    }
    .card a:hover {
      color: #ff327c;
    }
    </style>
  </head>
  <body>
    <header>
      <img src="https://github.com/chrishiest/chrishiest.github.io/blob/main/images/header.png?raw=true" alt="SMASHFRUIT ARCADE" class="header-img">
    </header>
    <style>
      header {
        text-align: center;
      }
      .header-img {
        width: 50%;
        height: auto;
        display: inline-block;
      }
    </style>
    
    <h1>Check out these games!</h1>
    <div class="grid">
      <div class="card">
      <a href="dont_melt.html">
        <img src="https://img.itch.zone/aW1nLzIzMjk2ODE4LnBuZw==/315x250%23c/IwfUcO.png" alt="Don't Melt">
        Don't Melt
      </a>
    </div>
  </body>
</html>
